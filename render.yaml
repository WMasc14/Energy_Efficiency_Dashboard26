services:
  - type: web
    name: reactorlab
    env: python
    plan: starter
    branch: master
    buildCommand: pip install -r requirements.txt && npm install && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
